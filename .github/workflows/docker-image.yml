name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      env:
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: docker build . --file Dockerfile --tag devops_tp1_theo:$(date +%s) | 
          docker login -u agardys -p $DOCKER_PASSWORD | 
          docker push agardys/devops_tp1_theo:$(date +%s)
